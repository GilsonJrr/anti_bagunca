name: Production Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build in production profile"
        required: true
        type: choice
        default: android
        options:
          - android
          - ios
          - all

jobs:
  build-production:
    name: EAS Production Build
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
      EAS_BUILD_NO_EXPO_GO_WARNING: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        run: npm install --global eas-cli

      - name: Select platform
        id: platform
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=android" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.platform }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger production build
        run: eas build --platform ${{ steps.platform.outputs.value }} --profile production --non-interactive
